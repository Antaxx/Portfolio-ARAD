<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo Réservation IA | ARAD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="new-logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&family=Syne:wght@800&family=Unbounded:wght@900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepblack: '#121212',
                        sunset: '#E0E0E0',
                        cyansun: '#D4D4D4',
                    },
                    fontFamily: {
                        roca: ['"Roca One"', 'serif', 'sans-serif'],
                        outfit: ['"Outfit"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-deepblack text-white font-outfit h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_bottom_left,_var(--tw-gradient-stops))] from-white/10 via-deepblack to-deepblack overflow-hidden">

    <!-- Navigation -->
    <nav
        class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[95%] max-w-7xl flex justify-between items-center px-6 py-4">
        <a href="index.html" class="flex items-center gap-3 group">
            <div
                class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                <span class="text-xl">←</span>
            </div>
            <span
                class="text-sm font-bold uppercase tracking-widest opacity-60 group-hover:opacity-100 transition-opacity">Retour</span>
        </a>
        <div class="text-xs font-black tracking-widest uppercase opacity-40">ARAD AI Lab / 03</div>
    </nav>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-12 mt-12 overflow-hidden h-full max-h-[80vh]">
        <!-- Text Side -->
        <div class="flex flex-col justify-center reveal-up">
            <h1 class="text-4xl md:text-6xl font-black uppercase font-roca leading-tight mb-6">IA de Réservation</h1>
            <p class="text-lg text-gray-400 mb-8 leading-relaxed">COQUILLE UI : Prête pour connexion n8n. L'interface
                comprendra le langage naturel via votre workflow externe.</p>
        </div>

        <!-- Interactive Form Shell -->
        <div
            class="bg-white/5 backdrop-blur-3xl border-4 border-white/10 rounded-[3rem] p-10 shadow-2xl relative flex flex-col overflow-hidden">
            <div class="flex-1 space-y-8 overflow-y-auto pr-2">
                <h2 class="text-2xl font-black uppercase font-roca tracking-wider mb-8">Interface de Réservation</h2>

                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black tracking-[0.3em] text-white/40 ml-2">Saisie libre
                            (ex: table pour 2 demain soir)</label>
                        <input type="text" placeholder="En attente de connexion n8n..."
                            class="w-full bg-deepblack/60 border-2 border-white/10 p-5 rounded-2xl focus:outline-none focus:border-white transition-all text-xl font-bold italic"
                            id="input-reservation">
                    </div>

                    <!-- Dynamic Feedback Zone (Empty) -->
                    <div id="ai-response-zone" class="hidden bg-white/10 p-6 rounded-2xl border border-white/20">
                        <p class="text-sm italic text-gray-300"></p>
                    </div>

                    <button
                        class="w-full bg-white/10 text-white/30 py-5 rounded-2xl font-black uppercase tracking-widest cursor-not-allowed border-2 border-white/5"
                        disabled>Confirmer (n8n Requis)</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const input = document.getElementById('input-reservation');
        input.addEventListener('input', (e) => {
            console.log("Input à envoyer à n8n pour parsing :", e.target.value);
        });
    </script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script defer src="app.js"></script>
</body>



</html>
