<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo Avis IA | ARAD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="new-logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&family=Syne:wght@800&family=Unbounded:wght@900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepblack: '#121212',
                        sunset: '#E0E0E0',
                        cyansun: '#D4D4D4',
                    },
                    fontFamily: {
                        roca: ['"Roca One"', 'serif', 'sans-serif'],
                        outfit: ['"Outfit"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-deepblack text-white font-outfit h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-white/10 via-deepblack to-deepblack">

    <!-- Navigation -->
    <nav
        class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[95%] max-w-7xl flex justify-between items-center px-6 py-4">
        <a href="index.html" class="flex items-center gap-3 group">
            <div
                class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                <span class="text-xl">←</span>
            </div>
            <span
                class="text-sm font-bold uppercase tracking-widest opacity-60 group-hover:opacity-100 transition-opacity">Retour</span>
        </a>
        <div class="text-xs font-black tracking-widest uppercase opacity-40">ARAD AI Lab / 04</div>
    </nav>

    <main class="w-full max-w-4xl pt-20 pb-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black uppercase font-roca mb-4 leading-tight">Générateur de Réponses
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">Interface UI prête pour connexion n8n. Le bouton enverra
                le texte à votre workflow pour générer une réponse.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
            <!-- Input Side -->
            <div class="bg-white/5 border-4 border-white/10 p-8 rounded-[3rem] shadow-2xl flex flex-col">
                <label class="text-[10px] uppercase font-black tracking-[0.3em] text-white/40 mb-4 ml-2">Avis
                    Client</label>
                <textarea id="review-input" rows="6"
                    class="flex-1 bg-deepblack/40 border-2 border-white/10 p-6 rounded-2xl focus:outline-none focus:border-white transition-all text-sm font-medium resize-none placeholder-white/10 text-white"
                    placeholder="Collez un avis ici..."></textarea>
                <button id="btn-generate"
                    class="mt-8 bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-transform">Générer
                    via n8n</button>
            </div>

            <!-- Output Side -->
            <div
                class="bg-[#1a1a1a]/40 backdrop-blur-3xl border-4 border-white/10 p-8 rounded-[3rem] shadow-2xl flex flex-col relative overflow-hidden">
                <label class="text-[10px] uppercase font-black tracking-[0.3em] text-white/40 mb-4 ml-2">Réponse
                    générée</label>
                <div id="response-output"
                    class="flex-1 text-sm leading-relaxed text-gray-300 font-medium italic opacity-20">
                    En attente de traitement...
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const btn = document.getElementById('btn-generate');
        const input = document.getElementById('review-input');

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            if (!text) return;
            console.log("Texte de l'avis à envoyer à n8n :", text);
            // ICI : Fetch vers webhook n8n
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script>
        // Smooth Scroll (Lenis)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Lenis !== 'undefined') {
                const lenis = new Lenis();
                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
            }
        });
    </script>
</body>


</html>
